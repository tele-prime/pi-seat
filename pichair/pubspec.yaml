name: pichair
description: "Massage chair project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  flutter_native_splash: ^2.4.6
  flutter_neumorphic_plus: ^3.5.0
  flutter_joystick: ^0.2.2
  flutter_glow: ^0.3.2
  network_info_plus: ^7.0.0
  shared_preferences: ^2.5.3
  virtual_keyboard_multi_language: ^1.1.2
  video_player: 2.8.1
  shimmer_animation: ^2.2.2+1
  scrollable_list_tab_scroller: ^3.1.1
  animated_toggle_switch: ^0.8.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/lights/
    - assets/flags/
    - assets/fonts/
    - assets/icons/
    - assets/apps/
    - assets/logos/
    - assets/pdf/

  fonts:
    - family: Pyidaungsu
      fonts:
        - asset: assets/fonts/Pyidaungsu.ttf
    - family: SeatIcon
      fonts:
        - asset: assets/fonts/SeatIcon.ttf